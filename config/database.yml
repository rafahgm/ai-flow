default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { "5432" } %>
  user: <%= ENV.fetch("DB_USER") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "postgres" } %>
  timeout: 5000

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "ai_flow_development") %>

test:
  <<: *default
  database: ai_flow_test

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "ai_flow_production") %>
